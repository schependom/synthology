dataset:
  name: "owl2bench"
  universities: [5]
  output_dir: "data/owl2bench/output"

  split:
    train: 0.8
    val: 0.1
    test: 0.1

  target_ratio: 0.0
  mask_base_facts: false
  num_samples: 1
  # bfs_subgraphs: paper-aligned many small graphs; university_prefix: one graph per university; chunk: legacy.
  partition_mode: "bfs_subgraphs"
  bfs:
    sample_count: 1800
    max_individuals_per_sample: 120
  # Enforce multiple sample_id graphs in each non-empty split CSV.
  require_multiple_graphs_per_csv: true
  # Set >0 to cap inferred positive targets for fair cross-generator matching.
  inferred_target_limit: 250000
  # Negative targets generated per positive target.
  negatives_per_positive: 1
  diagnostics:
    enabled: true
    output_dir: "data/owl2bench/output/diagnostics"
    # <= 0 means write all rows to each diagnostics TSV file.
    max_rows_per_file: 200000

  reasoning:
    tbox_path: "ontologies/UNIV-BENCH-OWL2RL.owl"
    # Defensive mapping for generator variants that emit legacy LUBM-style namespaces.
    namespace_map:
      "http://swat.cse.lehigh.edu/onto/univ-bench.owl#": "https://kracr.iiitd.edu.in/OWL2Bench#"
    materialization:
      reasoner: "jena"
      jena_profile: "owl_mini"
      # Enforce single-pass Jena for OWL2Bench to prevent massive iteration overhead.
      iterative: false
      max_iterations: 1
      timing:
        enabled: false
        output_dir: "data/exp3/timings"
        run_tag: "exp3_owl2bench"

generator:
  vendor_dir: "vendor/OWL2Bench"
  profile: "RL"
  seed: 1
  maven_executable: "${oc.env:MAVEN_EXECUTABLE,mvn}"
