defaults:
  - config
  - _self_

# Exp 3 baseline runs RAFM + Apache Jena over OWL2Bench ontology inputs.
ontology:
  path: "data/OWL2Bench/input/UNIV-BENCH-OWL2RL.owl"

dataset:
  n_train: 300
  n_val: 30
  n_test: 30
  train_fact_cap: null
  val_fact_cap: null
  test_fact_cap: null
  train_target_cap: null
  val_target_cap: null
  test_target_cap: null
  output_dir: "data/exp3/baseline/owl2bench"
  seed: 23

generator:
  min_individuals: 20
  max_individuals: 80
  min_base_relations: 30
  max_base_relations: 120
  base_relations_per_sample: null
  min_types_per_individual: 1
  max_types_per_individual: 3
  enforce_domain_range: true
  allow_reflexive: false
  namespace_base: "http://synthology.org/exp3/fc/"

materialization:
  reasoner: jena
  iterative: true
  max_iterations: 12
  rdfs_closure: true
  axiomatic_triples: false
  datatype_axioms: false

neg_sampling:
  ratio: 1.0
  max_attempts_per_negative: 40

logging:
  level: INFO
