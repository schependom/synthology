# Smoke preset for fast Exp3 iteration (2 universities, ~minutes per step).
#
# Fixes two critical bugs found in the 2026-04-18 full run:
#
#   1. reasoning_input_triple_cap=1200 was far too small → almost no inferred
#      facts, almost no negatives (448 K positives : 6 K negatives in baseline).
#      Fix: raise cap to 15 000 for smoke (0 = no cap for the full HPC run).
#      Note: owl_full was attempted to improve materialization completeness but
#      crashed with OOM even on this 2-university ABox (logs/exp3_smoke_28241977.out).
#      Staying with owl_mini; its incompleteness is documented in the paper.
#
#   2. Mismatched budgets: baseline had 440 K facts but only 3 % inferred targets;
#      synthology had 228 K facts but all targets were inferred.
#      Fix: cap inferred positives to a shared limit (inferred_target_limit) so
#      both methods produce the same number of positive targets before balancing.
#
# Run order:
#   uv run invoke exp3-generate-baseline-hpc   --config-path=configs/experiments/exp3_smoke.yaml
#   uv run invoke exp3-generate-synthology-hpc --config-path=configs/experiments/exp3_smoke.yaml
#   uv run invoke exp3-balance-data-hpc        --config-path=configs/experiments/exp3_smoke.yaml
#   uv run invoke exp3-report-and-analyze-hpc  --config-path=configs/experiments/exp3_smoke.yaml

universities: 3

baseline:
  # Selects configs/owl2bench/config_smoke.yaml (owl_mini, 200 BFS subgraphs,
  # reasoning_input_triple_cap=15000, inferred_target_limit=2000).
  owl2bench_config_name: config_smoke
  args: ""
  reasoning_input_triple_cap: 0
  abox_jena_heap_mb: 8192

synthology:
  # Selects configs/ont_generator/exp3_synthology_smoke.yaml (n_train=60,
  # proof_roots_per_rule=6).  Balance step will downsample to match baseline.
  config_name: exp3_synthology_smoke
  args: ""

training:
  args: ""

report:
  baseline_path: ""
  synthology_path: ""
  use_balanced_synthology: true
  args: ""
  run_baseline_analysis: false

balance:
  baseline_dir: ""
  synthology_dir: ""
  output_dir: ""
  seed: 23

gold_test:
  source_test_dir: ""
  output_test_dir: ""
