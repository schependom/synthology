universities: 14

baseline:
  # 14 universities (~679K base triples) matches Synthology's n_train=1000 budget.
  # Each university yields ~72 unique BFS train sample_ids (at bfs.sample_count=1260,
  # density 90/university), giving 14×72=1008 unique training contexts.
  # Memory model: process_GB ≈ 58.9 × (u×48495/969891)^0.55 → u=14: ~48 GB process,
  # fits in 51 GB heap / 64 GB node.  u=20 was tried but Jena LP tabling OOM'd at
  # 51 GB heap (970K-triple ABox); u=19 is the estimated safe ceiling (~50 GB process).
  reasoning_input_triple_cap: 0
  abox_jena_heap_mb: 51200
  # All canonical paper settings are already set in configs/owl2bench/config.yaml.
  # Only add genuine per-run overrides here; leave empty for paper runs.
  args: ""

synthology:
  args: ""

training:
  args: ""

report:
  baseline_path: ""
  synthology_path: ""
  use_balanced_synthology: true
  args: ""
  run_baseline_analysis: false

balance:
  baseline_dir: ""
  synthology_dir: ""
  output_dir: ""
  seed: 23

gold_test:
  source_test_dir: ""
  output_test_dir: ""
