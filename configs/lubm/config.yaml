# ============================================================================== #
# LUBM Pipeline Configuration
# ============================================================================== #

dataset:
  # The name of the dataset format/folder that will be generated
  name: "lubm"
  
  # List of dataset sizes (university counts) to generate sequentially.
  # The LUBM generator creates synthetic data where the size is parameterized 
  # by the number of universities. 1 univ ~= ~100k generated triples.
  sizes:
    - 1
    # - 5
    # - 10
  
  # Output directory for the datasets (standard format parsed CSVs)
  output_dir: "data/lubm"

  # Ratios for splitting the parsed triples into train/val/test sets
  # Should sum to 1.0. If not, it will be normalized by the parser.
  split:
    train: 0.8
    val: 0.1
    test: 0.1

  # Target Ratio for Link Prediction (Artificial Sparsity)
  # Determines the percentage (0.0 to 1.0) of edges inside each split to be 
  # held-out of the context graph (facts.csv) and used solely as prediction 
  # targets (targets.csv). A value of 0.2 means 20% of edges are dropped.
  target_ratio: 0.2

  # Whether to mask a random subset of base facts and place them only in
  # targets.csv as positive prediction targets (type=inferred, hops=0).
  # Set to false to keep all base facts in facts.csv and only include
  # reasoner-derived inferred positives in targets.csv.
  mask_base_facts: false

  # Number of Independent Subgraph Samples
  # The parser will sequentially chunk the aggregated LUBM triples into this
  # exact number of datasets (sample_ids) while preserving local graph density.
  # Set to 'null' to automatically use the exact number of raw TTL files generated 
  # (e.g. 10 files = 10 samples).
  num_samples: 100

  # Reasoning configuration for computing inferred targets from base facts.
  reasoning:
    enabled: true
    # Apache Jena settings for materializing inferred facts.
    # The vendor directory is expected to contain Apache Jena binaries.
    # Download with: uv run invoke gen-lubm-tbox
    tbox_path: "data/ont/input/lubm.ttl"
    # Remap ontology namespaces to match generated ABox namespaces.
    namespace_map:
      "http://swat.cse.lehigh.edu/onto/univ-bench.owl#": "http://www.lehigh.edu/~zhp2/2004/0401/univ-bench.owl#"
    jena:
      # Path or command name for Java runtime used to run JenaMaterializer.java.
      executable: "java"
      # Shell command template used to run materialization.
      # Available placeholders:
      # - {jena_executable}
      # - {input_abox}
      # - {input_tbox}
      # - {output_ttl}
      #
      # IMPORTANT: This template runs the OWL-based Java materializer.
      # It uses Jena jars from vendor/apache-jena-6.0.0/lib and the local
      # apps/LUBM/src/lubm/vendor/JenaMaterializer.java source file.
      command_template: "{jena_executable} --class-path 'vendor/apache-jena-6.0.0/lib/*' apps/LUBM/src/lubm/vendor/JenaMaterializer.java {input_tbox} {input_abox} {output_ttl}"

generator:
  # The format of the output from the Java generator. 
  # TURTLE is required for the Python parser to read it accurately using rdflib.
  format: "TURTLE"
  
  # Consolidation mode. 
  # "Maximal" combines output graphs to reduce thousands of small files into a handful of larger ones.
  # Highly recommended for Turtle format to prevent OS file limit errors.
  consolidate: "Maximal"
  
  # Number of threads the Java generator should use for multi-threading.
  # Increase based on your machine/HPC core count to vastly speed up large generations.
  # Set to 0 to automatically detect and use all available CPU cores.
  threads: 0
