# ============================================================================== #
# LUBM Reasoner Verification Configuration
# ============================================================================== #

verification:
  # Modes:
  # - subset: sample from an existing raw LUBM dataset (recommended for realistic checks)
  # - toy: use tiny in-memory ontology with fixed expected inferences
  mode: "subset"

source:
  # Used in subset mode
  raw_dir: "data/lubm/raw/lubm_1"
  ttl_glob: "*.ttl"
  tbox_path: "data/ont/input/lubm.ttl"

subset:
  # Maximum number of base facts sampled from source.raw_dir
  max_base_facts: 500
  # Deterministic subset sampling
  seed: 23

checks:
  # Generic quality checks after CSV export
  min_inferred_positive: 1
  min_max_hops: 1

reasoning:
  namespace_map:
    "http://swat.cse.lehigh.edu/onto/univ-bench.owl#": "http://www.lehigh.edu/~zhp2/2004/0401/univ-bench.owl#"
  jena:
    executable: "java"
    # Fill this with your Jena materialization command. Placeholders:
    # {jena_executable}, {input_abox}, {input_tbox}, {output_ttl}
    command_template: "{jena_executable} --class-path 'vendor/apache-jena-6.0.0/lib/*' apps/LUBM/src/lubm/vendor/JenaMaterializer.java {input_tbox} {input_abox} {output_ttl}"

output:
  # Root folder where all verification artifacts are stored
  root_dir: "data/lubm/toy_verify"
  clean_before_run: true

  # Sub-folder labels under root_dir/raw and root_dir/out
  dataset_label: "lubm_subset"
  source_ttl_name: "subset_input.ttl"

  # Parsing/export controls (same semantics as parse_to_csv)
  split:
    train: 1.0
    val: 0.0
    test: 0.0
  target_ratio: 0.0
  num_samples: 1

  graph:
    enabled: true
    name: "verification_reasoning_graph"
    title: "Verification Graph (Base + Inferred)"
    # Guardrail so graph export remains readable and under visualizer hard caps.
    max_base_facts: 60
