defaults:
  - _self_
  - dataset: familytree # Select dataset subconfig from configs/ont_generator/dataset/

# Python random seed used by dataset generation and sampling decisions.
seed: 23

ontology:
  # TBox path used by the backward-chaining generator.
  path: "ontologies/family.ttl"

# Optional diagnostic exports.
export_proofs: false
export_graphs: false

generator:

  # Per-sample size constraints. Samples outside this individual-count range are discarded.
  min_individuals: 1
  max_individuals: 1000
  # Number of rules selected per sample is random.randint(min_rules, min(max_rules, len(all_rules))).
  min_rules: 1
  max_rules: 5
  # Rule sampling mode:
  # - random: original stochastic sampling
  # - balanced: prioritize rules with lower historical usage counts
  rule_sampling_mode: "random"
  # If true, training samples prioritize rules whose conclusion predicates
  # have not yet been generated in accepted samples.
  enforce_goal_predicate_coverage: false
  # For each selected rule, proof count is sampled as:
  # random.randint(min(len(proofs), target_min_proofs_rule), min(len(proofs), 10000)).
  # This controls how many proofs are kept in the proof map before building the KG.
  target_min_proofs_rule: 20

  # Backward-chaining limits.
  # Recursive rule usage cap per recursive rule name.
  max_recursion: 5
  # Hard stop for proof search depth in _find_proofs_recursive.
  global_max_depth: 10
  # Max number of yielded proofs per goal atom during recursive search.
  max_proofs_per_atom: 20
  # Validation threshold for largest connected component ratio.
  min_lcc_ratio: 0.6

  # Allowed values in code: "random" or "stratified".
  # Any other value logs a warning and falls back to "random".
  proof_selection_strategy: "random"
  # Used only when proof_selection_strategy == "stratified".
  # Buckets are based on proof depth: easy (<=1), medium (2..4), hard (>=5).
  # Non-positive total weight falls back to uniform weights.
  proof_selection_weights:
    easy: 20
    medium: 40
    hard: 40

  # Individual generation behavior in chainer.
  # Max number of cached individuals available for reuse.
  individual_pool_size: 60
  # Probability to reuse an existing individual instead of creating a new one.
  individual_reuse_prob: 0.7
  # If true, proofs are grouped by path signature and one proof per signature is kept.
  use_signature_sampling: true
  # Number of rule-root attempts per selected rule is random.randint(min_proof_roots, max_proof_roots),
  # unless proof_roots_per_rule is set.
  min_proof_roots: 5
  max_proof_roots: 20
  # If not null, both min_proof_roots and max_proof_roots are set to this fixed integer.
  proof_roots_per_rule: null
  # If true, always allow a base proof even when matching derivation rules exist.
  # If false, base proofs are yielded only when no matching rules exist.
  always_generate_base: false
  # Predicates that are always emitted as base ABox facts (never derived).
  # Use for pure-inverse-cycle pairs so their partner predicate becomes inferable.
  force_base_predicates: []
  # If true, writes per-sample CSVs via save_dataset_to_csv in addition to split files.
  save_individual_samples: false

neg_sampling:

  # Allowed values in NegativeSampler: random, constrained, proof_based, type_aware, mixed.
  # "mixed" randomly selects one of the four strategies per corruption event.
  strategy: "mixed"
  mixed_weights:
    random: 0.0
    constrained: 1.0
    proof_based: 1.0
    type_aware: 0.0
  # Number of negatives is int(number_of_positives * ratio) for triples and memberships.
  ratio: 1.0
  # Used by proof_based/mixed path to also keep direct base-fact corruptions.
  corrupt_base_facts: false

logging:
  level: INFO
