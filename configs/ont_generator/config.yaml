defaults:
  - _self_
  - dataset: familytree # or owl2bench

ontology:
  path: "ontologies/family.ttl"

export_proofs: false
export_graphs: false

generator:
  max_recursion: 5
  global_max_depth: 10
  max_proofs_per_atom: 5
  min_lcc_ratio: 0.6
  proof_selection_strategy: "random"
  proof_selection_weights:
    easy: 20
    medium: 40
    hard: 40
  individual_pool_size: 60
  individual_reuse_prob: 0.7
  use_signature_sampling: true
  min_proof_roots: 5
  max_proof_roots: 20
  proof_roots_per_rule: null
  always_generate_base: false

neg_sampling:
  strategy: "mixed"
  ratio: 1.0
  corrupt_base_facts: false

logging:
  level: INFO
