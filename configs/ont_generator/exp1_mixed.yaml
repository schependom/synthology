# Configuration for Experiment 1: Mixed Negative Sampling
# The README file also contains further details.

defaults:
  - exp1_base # override default config options
  - _self_

dataset:
  output_dir: "data/exp1/mixed"

neg_sampling:
  strategy: "mixed"
  mixed_weights:
    random: 0.0
    constrained: 1.0
    proof_based: 1.0
    type_aware: 0.0
