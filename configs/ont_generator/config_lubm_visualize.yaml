defaults:
  - _self_

ontology:
  path: "data/ont/input/lubm.ttl"

graph_output_path: "data/ont/output/lubm-visualize/graphs/" 
proof_output_path: "data/ont/output/lubm-visualize/proofs/"

dataset:
  n_train: 5
  n_test: 2
  n_val: 2
  min_individuals: 10
  max_individuals: 5000
  min_rules: 2
  max_rules: 15
  min_proofs_per_rule: 3
  output_dir: "data/ont/output/lubm-visualize"
  seed: 42

export_proofs: true
export_graphs: true

generator:
  max_recursion: 4
  min_lcc_ratio: 0.0
  global_max_depth: 8
  max_proofs_per_atom: 4
  individual_pool_size: 100
  individual_reuse_prob: 0.8
  use_signature_sampling: true
  min_proof_roots: 10
  max_proof_roots: 20
  always_generate_base_facts: false

negative_sampling:
  strategy: "proof_based"
  ratio: 1.0
  corrupt_base_facts: true

logging:
  level: DEBUG
