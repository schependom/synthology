# See config.yaml for more details about all configuration options.
# The README file also contains further details.

defaults:
  - config # override default config options
  - _self_

# Fixed seed to keep parity runs deterministic.
seed: 23

ontology:
  path: "ontologies/family.ttl"

dataset:
  n_train: 1200
  n_val: 150
  n_test: 150
  train_fact_cap: null
  val_fact_cap: null
  test_fact_cap: null
  train_target_cap: null
  val_target_cap: null
  test_target_cap: null
  output_dir: "data/exp2/synthology/family_tree"

hydra:
  run:
    dir: "${dataset.output_dir}/hydra"

export_proofs: false
export_graphs: false

generator:
  min_individuals: 4
  max_individuals: 240
  min_rules: 1
  max_rules: 5
  target_min_proofs_rule: 5
  save_individual_samples: false
  max_recursion: 3
  global_max_depth: 10
  max_proofs_per_atom: 5
  min_lcc_ratio: 0.6
  proof_selection_strategy: "random"
  proof_selection_weights:
    easy: 20
    medium: 40
    hard: 40
  individual_pool_size: 60
  individual_reuse_prob: 0.7
  use_signature_sampling: true
  min_proof_roots: 5
  max_proof_roots: 20
  proof_roots_per_rule: null
  always_generate_base: false

neg_sampling:
  strategy: "mixed"
  ratio: 1.0
  corrupt_base_facts: false

logging:
  level: INFO
