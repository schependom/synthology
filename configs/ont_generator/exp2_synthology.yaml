# See config.yaml for full documentation of all options.
# Only overrides from config.yaml defaults are listed here.

defaults:
  - config
  - _self_

dataset:
  n_train: 1200
  n_val: 0
  n_test: 0
  train_fact_cap: 400000
  output_dir: "data/exp2/synthology/family_tree"

hydra:
  run:
    dir: "${dataset.output_dir}/hydra"

generator:
  min_individuals: 30
  max_individuals: 150
  min_rules: 5
  max_rules: 10
  rule_sampling_mode: "balanced"
  enforce_goal_predicate_coverage: true
  target_min_proofs_rule: 10
  max_recursion: 5
  global_max_depth: 12
  max_proofs_per_atom: 5
  min_lcc_ratio: 0.5
  proof_selection_strategy: "stratified"
  proof_selection_weights:
    easy: 2
    medium: 55
    hard: 43
  individual_pool_size: 5000
  individual_reuse_prob: 0.5
  min_proof_roots: 10
  max_proof_roots: 30
  proof_roots_per_rule: 12
