defaults:
  - config
  - _self_

ontology:
  path: "ontologies/family.ttl"

dataset:
  n_train: 0
  n_val: 0
  n_test: 600
  train_fact_cap: null
  val_fact_cap: null
  test_fact_cap: null
  min_individuals: 1
  max_individuals: 1000
  min_rules: 2
  max_rules: 6
  target_min_proofs_rule: 8
  output_dir: "data/exp2/frozen_test"
  seed: 23
  save_individual_samples: false

hydra:
  run:
    dir: "${dataset.output_dir}/hydra"

export_proofs: false
export_graphs: false

generator:
  max_recursion: 4
  global_max_depth: 10
  max_proofs_per_atom: 5
  min_lcc_ratio: 0.6
  individual_pool_size: 60
  individual_reuse_prob: 0.7
  use_signature_sampling: true
  min_proof_roots: 8
  max_proof_roots: 16
  proof_roots_per_rule: null
  always_generate_base: false

neg_sampling:
  strategy: "proof_based"
  ratio: 1.0
  corrupt_base_facts: false

logging:
  level: INFO
