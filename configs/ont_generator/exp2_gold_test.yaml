# See config.yaml for full documentation of all options.
# Only overrides from config.yaml defaults are listed here.

defaults:
  - config
  - _self_

# Keep gold-test reproducible across reruns.
dataset:
  n_train: 0
  n_val: 0
  n_test: 350
  output_dir: "data/exp2/frozen_test"

hydra:
  run:
    dir: "${dataset.output_dir}/hydra"

generator:
  min_individuals: 6
  max_individuals: 300
  min_rules: 2
  max_rules: 6
  target_min_proofs_rule: 8
  max_recursion: 4
  global_max_depth: 9
  max_proofs_per_atom: 5
  min_proof_roots: 8
  max_proof_roots: 16

neg_sampling:
  strategy: "proof_based"
