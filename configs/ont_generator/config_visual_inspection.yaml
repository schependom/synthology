defaults:
  - config
  - _self_

dataset:
  n_train: 3
  n_val: 0
  n_test: 0
  min_individuals: 30
  max_individuals: 100
  min_rules: 2
  max_rules: 6
  output_dir: "data/ont/visual_inspection"

export_proofs: true
export_graphs: true

generator:
  max_recursion: 3

negative_sampling:
  strategy: "mixed"
  ratio: 1.0
  corrupt_base_facts: true
