defaults:
  - config
  - _self_

dataset:
  n_train: 3
  n_val: 0
  n_test: 0
  min_individuals: 10
  max_individuals: 50
  min_rules: 2
  max_rules: 6
  output_dir: "visual-verification"

export_proofs: true
export_graphs: true

generator:
  max_recursion: 3

neg_sampling:
  strategy: "mixed"
  ratio: 1.0
  corrupt_base_facts: true
