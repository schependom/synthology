defaults:
  - config
  - override dataset: owl2bench
  - _self_

ontology:
  path: "ontologies/UNIV-BENCH-OWL2RL.owl"

dataset:
  n_train: 160
  n_val: 0
  n_test: 0
  output_dir: "data/exp3/synthology/owl2bench"  # overridden per-run by the task

hydra:
  run:
    dir: "${dataset.output_dir}/hydra"

neg_sampling:
  corrupt_base_facts: true

generator:
  min_individuals: 20
  max_individuals: 250
  min_rules: 3
  max_rules: 6
  rule_sampling_mode: "balanced"
  enforce_goal_predicate_coverage: true
  target_min_proofs_rule: 10
  max_recursion: 5
  global_max_depth: 12
  max_proofs_per_atom: 15
  min_lcc_ratio: 0.55
  proof_selection_strategy: "stratified"
  proof_selection_weights:
    easy: 10
    medium: 40
    hard: 50
  individual_pool_size: 400
  individual_reuse_prob: 0.65
  # Halved from 12 → 6 to keep smoke runtime short.
  proof_roots_per_rule: 6
