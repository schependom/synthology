# Validation Set Configuration for Experiment 1
# Generated using 'mixed' negative sampling for an unbiased baseline.

defaults:
  - config # override default config options
  - _self_

seed: 45 # distinct from training (42) and testing (46)

dataset:
  output_dir: "data/exp1/val_set"
  n_train: 0
  n_val: 500
  n_test: 0

hydra:
  run:
    dir: "${dataset.output_dir}/hydra"

neg_sampling:
  strategy: "mixed"
  corrupt_base_facts: true
  mixed_weights:
    proof_based: 0.5
    constrained: 0.5
    random: 0.0
    type_aware: 0.0

generator:
  min_lcc_ratio: 0.6
