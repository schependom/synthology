# See config.yaml for more details about all configuration options.
# The README file also contains further details.

defaults:
  - _self_ 

seed: 23

ontology:
  path: "ontologies/family.ttl"

graph_output_path: "data/ont/output/family-visualize/graphs/" 
proof_output_path: "data/ont/output/family-visualize/proofs/"

dataset:
  n_train: 5
  n_test: 2
  n_val: 2
  output_dir: "data/ont/output/family-visualize"

export_proofs: true
export_graphs: true

generator:
  min_individuals: 1
  max_individuals: 1000
  min_rules: 1
  max_rules: 5
  target_min_proofs_rule: 3
  max_recursion: 3
  global_max_depth: 8
  max_proofs_per_atom: 3
  min_lcc_ratio: 0.6
  individual_pool_size: 50
  individual_reuse_prob: 0.7
  use_signature_sampling: true
  min_proof_roots: 5
  max_proof_roots: 10
  always_generate_base: false

neg_sampling:
  strategy: "proof_based"
  ratio: 1.0
  corrupt_base_facts: true

logging:
  level: DEBUG
