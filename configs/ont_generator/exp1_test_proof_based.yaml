# Test Set Configuration for Experiment 1
# Generated using purely 'proof_based' negative sampling to isolate reasoning capabilities.

defaults:
  - config # override default config options
  - _self_

seed: 47 # distinct from training and mixed test sets

dataset:
  output_dir: "data/exp1/test_set_proof_based"
  n_train: 0
  n_val: 0
  n_test: 500

hydra:
  run:
    dir: "${dataset.output_dir}/hydra"

neg_sampling:
  strategy: "proof_based"
  corrupt_base_facts: false

generator:
  min_lcc_ratio: 0.6
