defaults:
  - config
  - _self_

# Default paths follow the convention used in the paper runbook.
# Override with Hydra if your run directories differ.
methods:
  - name: baseline
    path: data/owl2bench/output/owl2bench
  - name: synthology
    path: data/exp3/balanced/owl2bench

splits:
  - train

output:
  dir: reports/exp3/compare
  save_plots: true
  merge_intermediate_into_inferred_for_plots: true
  top_k_predicates: 15
  ignore_predicates:
    - rdf:type
  inferred_only: true

logging:
  level: INFO
