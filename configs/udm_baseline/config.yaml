defaults:
  - _self_

ontology:
  path: "ontologies/family.ttl"

dataset:
  n_train: 200
  n_val: 200
  n_test: 200
  train_fact_cap: null
  val_fact_cap: null
  test_fact_cap: null
  train_target_cap: null
  val_target_cap: null
  test_target_cap: null
  output_dir: "data/fc/family_tree"
  seed: 23

generator:
  min_individuals: 5
  max_individuals: 25
  min_base_relations: 8
  max_base_relations: 40
  base_relations_per_sample: null
  min_types_per_individual: 1
  max_types_per_individual: 2
  enforce_domain_range: true
  allow_reflexive: false
  namespace_base: "http://synthology.kuleuven.be/udm/"

materialization:
  # Jena-only materialization backend.
  reasoner: jena
  # Apache Jena profile. Choices: owl_micro, owl_mini, owl_full
  jena_profile: owl_mini
  # Kept for backward compatibility; ignored because Jena computes fixpoint internally.
  iterative: false
  max_iterations: 10
  timing:
    enabled: false
    output_dir: "data/exp2/timings"
    run_tag: "udm_jena"

neg_sampling:
  ratio: 1.0
  max_attempts_per_negative: 40

logging:
  level: INFO
