defaults:
  - config
  - _self_

ontology:
  path: "ontologies/family.ttl"

dataset:
  n_train: 1200
  n_val: 500
  n_test: 0
  train_fact_cap: null
  val_fact_cap: null
  test_fact_cap: null
  train_target_cap: null
  val_target_cap: null
  test_target_cap: null
  output_dir: "data/exp2/baseline/family_tree"
  seed: 23

generator:
  min_individuals: 15
  max_individuals: 70
  min_base_relations: 50
  max_base_relations: 200
  base_relations_per_sample: null
  min_types_per_individual: 1
  max_types_per_individual: 2
  enforce_domain_range: true
  allow_reflexive: false
  namespace_base: "http://synthology.org/exp2/fc/"

materialization:
  # Exp 2 uses Apache Jena closure materialization.
  reasoner: jena
  jena_profile: owl_micro
  iterative: false # single-pass closure
  
  timing:
    enabled: true
    output_dir: "data/exp2/timings"
    run_tag: "exp2_baseline"

neg_sampling:
  ratio: 1.0
  max_attempts_per_negative: 40

logging:
  level: INFO
